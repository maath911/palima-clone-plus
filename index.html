input,textarea,select{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;padding:12px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;width:100%;transition:border .2s,background .2s}

button:active{transform:scale(.97)}
input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#007AFF}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideFromBottom{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.fade-up{animation:fadeUp .3s ease forwards}
.slide-bottom{animation:slideFromBottom .38s cubic-bezier(.32,1,.23,1) forwards}
.scale-in{animation:scaleIn .25s ease forwards}
.pop-in{animation:popIn .22s cubic-bezier(.34,1.56,.64,1) forwards}
.glass{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}
.spin{animation:spin .8s linear infinite}
.pulse{animation:pulse 1.5s ease-in-out infinite}
.leaflet-container{background:#0a0a0a !important;border-radius:16px}
.leaflet-tile{filter:brightness(.7) saturate(.6)}
.custom-pin{background:transparent;border:none}

/* ══ SYNC ENGINE ════════════════════════════════════════ */
const useSyncEngine=()=>{
  const deviceId=useMemo(()=>LS.getDeviceId(),[]);
  const [syncStatus,setSyncStatus]=useState('idle');
  const pendingRef=useRef(new Set());const timersRef=useRef({});
  const syncTrip=useCallback(async(trip)=>{if(!navigator.onLine){setSyncStatus('offline');return;}try{setSyncStatus('syncing');await SB.upsertTrip(deviceId,trip);pendingRef.current.delete(trip.id);setSyncStatus('synced');setTimeout(()=>setSyncStatus('idle'),2500);}catch{setSyncStatus('error');};},[deviceId]);
  const debouncedSync=useCallback((trip)=>{pendingRef.current.add(trip.id);clearTimeout(timersRef.current[trip.id]);timersRef.current[trip.id]=setTimeout(()=>syncTrip(trip),1200);},[syncTrip]);
  const deleteFromCloud=useCallback(async(tid)=>{if(navigator.onLine)try{await SB.deleteTrip(deviceId,tid);}catch{};},[deviceId]);
  const pullFromCloud=useCallback(async()=>{if(!navigator.onLine)return null;try{setSyncStatus('syncing');const rows=await SB.fetchTrips(deviceId);setSyncStatus('synced');setTimeout(()=>setSyncStatus('idle'),2500);return rows?.map(r=>r.data)||[];}catch{setSyncStatus('error');return null;}},[deviceId]);
  useEffect(()=>{const onOnline=async()=>{const d=LS.get();(d.trips||[]).forEach(t=>{if(pendingRef.current.has(t.id))syncTrip(t);});};window.addEventListener('online',onOnline);return()=>window.removeEventListener('online',onOnline);},[syncTrip]);
  return{deviceId,syncStatus,debouncedSync,deleteFromCloud,pullFromCloud};
};

const useWeather=(destination,lat,lng)=>{
  const [wx,setWx]=useState(null);const [loading,setLoading]=useState(false);
  useEffect(()=>{if(!destination)return;const cached=LS.getWeather(destination);if(cached){setWx(cached);return;}const fetch_wx=async(la,lo)=>{try{const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7`);const d=await r.json();const days=(d.daily?.time||[]).slice(0,5).map((t,i)=>({date:t,code:d.daily.weathercode[i],max:Math.round(d.daily.temperature_2m_max[i]),min:Math.round(d.daily.temperature_2m_min[i])}));LS.setWeather(destination,days);setWx(days);}catch{}finally{setLoading(false);}};if(lat&&lng){fetch_wx(lat,lng);return;}setLoading(true);fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(destination)}&format=json&limit=1`).then(r=>r.json()).then(d=>{if(d[0])fetch_wx(d[0].lat,d[0].lon);else setLoading(false);}).catch(()=>setLoading(false));},[destination,lat,lng]);
  return{wx,loading};
};

/* ══ PRIMITIVES ══════════════════════════════════════════ */
const Btn=({children,onClick,color=C.accent,outline=false,sm=false,full=false,danger=false,loading=false,style:sx})=>{const bg=danger?C.red:color;return(<button onClick={onClick} disabled={loading} style={{background:outline?'transparent':bg,border:`1.5px solid ${outline?bg:'transparent'}`,color:outline?bg:'#fff',borderRadius:13,padding:sm?'8px 16px':'13px 22px',fontWeight:600,fontSize:sm?13:15,display:'flex',alignItems:'center',justifyContent:'center',gap:7,whiteSpace:'nowrap',width:full?'100%':'auto',opacity:loading?.7:1,...sx}}>{loading?<span className="spin" style={{display:'inline-block',width:14,height:14,border:`2px solid currentColor`,borderTopColor:'transparent',borderRadius:'50%'}}/>:children}</button>);};
const Tag=({children,color=C.accent,sm})=>(<span style={{background:color+'22',color,borderRadius:8,padding:sm?'2px 8px':'4px 11px',fontSize:sm?11:12,fontWeight:700,display:'inline-flex',alignItems:'center',gap:4}}>{children}</span>);
const Field=({label,children,half})=>(<div style={{marginBottom:13,flex:half?1:'unset'}}><label style={{display:'block',fontSize:12,color:C.t2,marginBottom:6,fontWeight:500}}>{label}</label>{children}</div>);
const Row=({children,gap=10})=>(<div style={{display:'flex',gap,alignItems:'flex-start'}}>{children}</div>);
const Divider=()=>(<div style={{height:1,background:C.border,margin:'16px 0'}}/>);
const SyncBadge=({status})=>{const cfg={idle:{c:C.t3,l:''},syncing:{c:C.orange,l:'Sync...'},synced:{c:C.green,l:'✓ Sauvegardé'},error:{c:C.red,l:'⚠ Erreur'},offline:{c:C.orange,l:'Hors ligne'}};const s=cfg[status]||cfg.idle;if(!s.l)return null;return(<span style={{fontSize:11,color:s.c,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>{status==='syncing'&&<span className="spin" style={{display:'inline-block',width:10,height:10,border:`1.5px solid ${s.c}`,borderTopColor:'transparent',borderRadius:'50%'}}/>}{s.l}</span>);};
const Modal=({onClose,children,title,icon})=>(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}}><div onClick={e=>e.stopPropagation()} className="slide-bottom" style={{background:C.s2,borderRadius:'24px 24px 0 0',width:'100%',maxWidth:520,maxHeight:'92vh',overflowY:'auto',padding:'24px 22px 56px'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}><h2 style={{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:700,display:'flex',alignItems:'center',gap:8}}>{icon&&<span style={{fontSize:22}}>{icon}</span>}{title}</h2><button onClick={onClose} style={{background:C.s3,borderRadius:10,color:C.t2,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center'}}>{I.x}</button></div>{children}</div></div>);

/* ══ BUDGET GAUGE ════════════════════════════════════════ */
const BudgetGauge=({trip,newAmount,label='cet achat'})=>{
  if(!trip?.total_budget||trip.total_budget===0)return null;
  const fl=trip.flights||[];const ho=trip.accommodations||[];const ac=trip.activities||[];const bi=trip.budget_items||[];
  const already=fl.reduce((s,f)=>s+(+f.price||0),0)+ho.reduce((s,h)=>s+(+h.total_price||0),0)+ac.reduce((s,a)=>s+(+a.price||0),0)+bi.reduce((s,b)=>s+(b.actual!=null?+b.actual:+b.estimated||0),0);
  const budget=+trip.total_budget||0;const sim=+newAmount||0;
  const afterPct=Math.min(100,Math.round(((already+sim)/budget)*100));const thisPct=budget>0?Math.round((sim/budget)*100):0;const reste=budget-already-sim;const alreadyPct=Math.min(100,Math.round((already/budget)*100));
  const isOver=reste<0;const isWarning=reste>=0&&reste/budget<0.2;const color=isOver?C.red:isWarning?C.orange:C.green;
  if(sim===0)return(<div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',borderRadius:14,padding:'12px 16px',marginTop:8,marginBottom:4}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{fontSize:12,color:C.t2}}>Budget restant</span><span style={{fontSize:12,fontWeight:700,color:C.green}}>{fc(budget-already,trip.currency)}</span></div><div style={{background:'rgba(255,255,255,.08)',borderRadius:6,height:6,overflow:'hidden'}}><div style={{width:alreadyPct+'%',height:'100%',background:C.accent,borderRadius:6}}/></div><p style={{fontSize:11,color:C.t3,marginTop:5}}>{alreadyPct}% du budget déjà engagé</p></div>);
  return(<div className="pop-in" style={{background:isOver?'rgba(255,69,58,.1)':isWarning?'rgba(255,159,10,.1)':'rgba(48,209,88,.06)',border:`1px solid ${color}35`,borderRadius:14,padding:'14px 16px',marginTop:8,marginBottom:4}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}><div><p style={{fontSize:13,fontWeight:700,color}}>{isOver?'⚠️ Dépassement !':isWarning?`⚠️ Reste seulement ${fc(reste,trip.currency)}`:`✅ ${fc(reste,trip.currency)} restant après ${label}`}</p><p style={{fontSize:11,color:C.t2,marginTop:3}}>Cet achat représente <strong style={{color}}>{thisPct}%</strong> du budget</p></div><span style={{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:800,color,flexShrink:0}}>{afterPct}%</span></div><div style={{background:'rgba(255,255,255,.08)',borderRadius:6,height:10,overflow:'hidden',position:'relative'}}><div style={{width:alreadyPct+'%',height:'100%',background:'rgba(255,255,255,.2)',borderRadius:6,position:'absolute',left:0}}/><div style={{width:afterPct+'%',height:'100%',background:color,borderRadius:6,transition:'width .4s',position:'absolute',left:0,opacity:.85}}/></div><div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:11,color:C.t3}}><span>Déjà: {fc(already,trip.currency)}</span><span style={{color}}>+{fc(sim,trip.currency)}</span><span>Budget: {fc(budget,trip.currency)}</span></div></div>);
};

          <DLLink emoji="🔴" label="Google Flights" href={DL.googleFlights(trip?.destination,trip?.start_date)} color="#ea4335"/>
        </div>
      </div>
      <Divider/>
      <p style={{fontSize:13,color:C.t2,marginBottom:14}}>✍️ Après avoir trouvé ton vol, remplis les infos essentielles :</p>

      {/* Simple mode — only 4 fields */}
      <Row><Field label="Départ (IATA)" half><input value={f.origin_iata} onChange={e=>s('origin_iata',e.target.value.toUpperCase())} maxLength={3} placeholder="CDG"/></Field><Field label="Arrivée (IATA)" half><input value={f.destination_iata} onChange={e=>s('destination_iata',e.target.value.toUpperCase())} maxLength={3} placeholder="TYO"/></Field></Row>

      {dur&&<div style={{background:'rgba(0,122,255,.1)',border:'1px solid rgba(0,122,255,.25)',borderRadius:10,padding:'8px 14px',marginBottom:10,fontSize:13,color:C.accent,fontWeight:600}}>⏱️ Durée : {Math.floor(dur/60)}h{String(dur%60).padStart(2,'0')}</div>}

          const done=checklist.filter(c=>c.checked).length;const pct2=checklist.length>0?Math.round((done/checklist.length)*100):0;
          const cats=[...new Set(checklist.map(c=>c.cat))];
          return(<div className="fade-up"><div className="glass" style={{borderRadius:16,padding:'16px 20px',marginBottom:16}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><div><p style={{fontFamily:'Syne,sans-serif',fontSize:22,fontWeight:800}}>{done}/{checklist.length}</p><p style={{fontSize:12,color:C.t2,marginTop:2}}>items complétés</p></div><div style={{textAlign:'right'}}><p style={{fontFamily:'Syne,sans-serif',fontSize:26,fontWeight:800,color:pct2===100?C.green:pct2>60?C.orange:C.accent}}>{pct2}%</p></div></div><div style={{background:'rgba(255,255,255,.08)',borderRadius:8,height:10,overflow:'hidden'}}><div style={{width:pct2+'%',height:'100%',background:pct2===100?C.green:pct2>60?C.orange:C.accent,borderRadius:8,transition:'width .5s'}}/></div></div>{cats.map(cat=>(<div key={cat} style={{marginBottom:14}}><p style={{fontSize:11,color:C.t3,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>{cat}</p>{checklist.filter(c=>c.cat===cat).map(item=>(<button key={item.id} onClick={()=>toggle(item.id)} style={{background:item.checked?'rgba(48,209,88,.1)':'rgba(255,255,255,.04)',border:`1px solid ${item.checked?'rgba(48,209,88,.3)':'rgba(255,255,255,.08)'}`,borderRadius:14,padding:'13px 16px',display:'flex',alignItems:'center',gap:12,textAlign:'left',width:'100%',marginBottom:6,transition:'all .18s'}}><span style={{fontSize:20}}>{item.icon}</span><span style={{flex:1,fontSize:14,color:item.checked?C.t2:'#fff',textDecoration:item.checked?'line-through':'none'}}>{item.label}</span><div style={{width:22,height:22,borderRadius:6,background:item.checked?C.green:'rgba(255,255,255,.08)',border:`1.5px solid ${item.checked?C.green:'rgba(255,255,255,.2)'}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .18s'}}>{item.checked&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}</div></button>))}</div>))}</div>);
        })()}
      </div>

      {modal==='flight'&&<FlightForm trip={trip} onAdd={f=>add('flights',f)} onClose={()=>setModal(null)}/>}
      {modal==='hotel'&&<HotelForm trip={trip} onAdd={h=>add('accommodations',h)} onClose={()=>setModal(null)}/>}
      {modal==='activity'&&<ActivityForm trip={trip} onAdd={a=>add('activities',a)} onClose={()=>setModal(null)}/>}
      {modal==='budget'&&<BudgetForm trip={trip} onAdd={b=>add('budget_items',b)} onClose={()=>setModal(null)}/>}
      {modal==='edit'&&<CreateTripWizard existing={trip} onSave={upd=>onUpdate({...trip,...upd})} onClose={()=>setModal(null)}/>}
      {modal==='share'&&(<Modal onClose={()=>setModal(null)} title="Partager" icon="🔗"><button onClick={shareLink} style={{background:copied?C.green+'20':C.accent+'18',border:`1px solid ${copied?C.green:C.accent}35`,borderRadius:14,padding:'16px 20px',color:copied?C.green:C.accent,fontWeight:600,fontSize:15,display:'flex',alignItems:'center',gap:10,width:'100%',justifyContent:'center',transition:'all .2s'}}>{copied?I.check:I.copy} {copied?'Lien copié !':'Copier le lien de partage'}</button></Modal>)}
      {showAdvisor&&<SmartAdvisorModal destination={trip.destination} dates={{start:trip.start_date,end:trip.end_date}} budget={trip.total_budget} currency={trip.currency} onClose={()=>setShowAdvisor(false)} onApply={(data)=>onUpdate({...trip,advisor:data})}/>}
    </div>
  );
}

/* ══ DASHBOARD ══════════════════════════════════════════ */
function Dashboard({trips,onCreate,onSelect,syncStatus,onSettings}){
  const now=new Date();
  const ongoing=trips.filter(t=>t.status==='ongoing');const upcoming=trips.filter(t=>t.status==='planning'&&t.start_date&&new Date(t.start_date)>now);const past=trips.filter(t=>t.status==='completed'||(t.end_date&&new Date(t.end_date)<now&&t.status!=='planning'));const other=trips.filter(t=>!ongoing.includes(t)&&!upcoming.includes(t)&&!past.includes(t));
  const TripCard=({trip,i})=>{
    const fl=trip.flights||[];const ho=trip.accommodations||[];const ac=trip.activities||[];const bi=trip.budget_items||[];
    const total=fl.reduce((s,f)=>s+(+f.price||0),0)+ho.reduce((s,h)=>s+(+h.total_price||0),0)+ac.reduce((s,a)=>s+(+a.price||0),0)+bi.reduce((s,b)=>s+(b.actual!=null?+b.actual:+b.estimated||0),0);
    const budget=+trip.total_budget||0;const pct=budget>0?Math.min(100,(total/budget)*100):0;const d=daysCount(trip.start_date,trip.end_date);
    const start=trip.start_date?new Date(trip.start_date):null;const daysUntil=start&&start>now?Math.ceil((start-now)/86400000):null;
    const db=findDestination(trip.destination);
    return(<div onClick={()=>onSelect(trip)} className="fade-up glass" style={{borderRadius:20,padding:'18px 20px',cursor:'pointer',animationDelay:i*.05+'s',transition:'border-color .2s'}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.accent+'50'} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div style={{display:'flex',gap:14,alignItems:'center',flex:1,minWidth:0}}>
          <div style={{fontSize:32,background:C.s3,borderRadius:14,padding:'8px 12px',flexShrink:0}}>{trip.cover_emoji}</div>
          <div style={{flex:1,minWidth:0}}>
            <h3 style={{fontFamily:'Syne,sans-serif',fontSize:17,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{trip.title}</h3>
            <p style={{fontSize:13,color:C.t2,marginTop:3}}>📍 {trip.destination}{d>0?` · ${d}j`:''}</p>
            {daysUntil!==null&&<p style={{fontSize:11,color:daysUntil<=7?C.orange:C.accent,marginTop:3,fontWeight:600}}>⏳ Dans {daysUntil}j</p>}
            {db&&<p style={{fontSize:10,color:'rgba(0,122,255,.5)',marginTop:2,fontWeight:600}}>🧠 Guide disponible</p>}
          </div>
        </div>
        <Tag color={STATUS_C[trip.status]} sm>{STATUS_L[trip.status]}</Tag>
      </div>
      <div style={{display:'flex',gap:12,marginTop:12,fontSize:12,color:C.t2,flexWrap:'wrap',alignItems:'center'}}>
        {fl.length>0&&<span>✈️ {fl.length}</span>}{ho.length>0&&<span>🏨 {ho.length}</span>}{ac.length>0&&<span>🎯 {ac.length}</span>}
        {budget>0&&<span style={{marginLeft:'auto',color:pct>90?C.red:C.accent,fontWeight:600}}>{fc(total,trip.currency)}/{fc(budget,trip.currency)}</span>}
      </div>
      {budget>0&&<div style={{background:C.s3,borderRadius:4,height:4,marginTop:10,overflow:'hidden'}}><div style={{width:pct+'%',height:'100%',background:pct>90?C.red:pct>70?C.orange:C.accent,borderRadius:4,transition:'width .4s'}}/></div>}
    </div>);
  };
  const Section=({title,list})=>list.length===0?null:(<div style={{marginBottom:24}}><p style={{fontSize:11,color:C.t3,fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,marginBottom:12}}>{title}</p><div style={{display:'flex',flexDirection:'column',gap:10}}>{list.map((t,i)=><TripCard key={t.id} trip={t} i={i}/>)}</div></div>);
  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <div style={{background:'linear-gradient(160deg,#0a0a1f 0%,#060610 50%,#000 100%)',padding:'52px 22px 32px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-60,right:-60,width:200,height:200,background:C.accent+'08',borderRadius:'50%',filter:'blur(40px)'}}/>
        <div style={{position:'absolute',bottom:-40,left:-40,width:150,height:150,background:C.purple+'08',borderRadius:'50%',filter:'blur(30px)'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
          <div><p style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:2.5,textTransform:'uppercase',marginBottom:4}}>Palima Clone Plus ✦ v5</p><h1 style={{fontFamily:'Syne,sans-serif',fontSize:32,fontWeight:800,lineHeight:1.1}}>Mes voyages</h1></div>
          <button onClick={onSettings} style={{background:C.glass,border:`1px solid ${C.border}`,borderRadius:14,color:C.t2,width:42,height:42,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(10px)',flexShrink:0}}>{I.settings}</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:24}}><p style={{fontSize:14,color:C.t2}}>🧠 Conseiller IA · Quartiers · Hôtels · Budget</p><SyncBadge status={syncStatus}/></div>
        <Btn onClick={onCreate}>{I.plus} Nouveau voyage</Btn>
        {trips.length>0&&(<div style={{display:'flex',gap:20,marginTop:24,paddingTop:20,borderTop:`1px solid ${C.border}`}}>{[{l:'Voyages',v:trips.length},{l:'En cours',v:ongoing.length},{l:'Planifiés',v:upcoming.length}].map(x=>(<div key={x.l}><p style={{fontFamily:'Syne,sans-serif',fontSize:22,fontWeight:800}}>{x.v}</p><p style={{fontSize:12,color:C.t3}}>{x.l}</p></div>))}</div>)}
      </div>
      <div style={{padding:'24px 18px'}}>
        {trips.length===0?(<div style={{textAlign:'center',padding:'60px 20px'}}><div style={{fontSize:60,marginBottom:20}}>🌍</div><h2 style={{fontFamily:'Syne,sans-serif',fontSize:22,color:C.t2,marginBottom:10}}>Aucun voyage</h2><p style={{fontSize:14,color:C.t3,lineHeight:1.7,maxWidth:280,margin:'0 auto 28px'}}>Crée ton voyage — l'app te dit quand partir, dans quel quartier loger et quelle est la fourchette de prix.</p><Btn onClick={onCreate}>{I.plus} Créer mon premier voyage</Btn></div>):(<><Section title="🟢 En cours" list={ongoing}/><Section title="🔵 À venir" list={upcoming}/><Section title="📦 Autres" list={other}/><Section title="✅ Terminés" list={past}/></>)}
      </div>
    </div>
  );
}

/* ══ APP ROOT ════════════════════════════════════════════ */
function App(){
  const [data,setData]=useState(()=>{const d=LS.get();return{trips:d.trips||[]};});
  const [selected,setSelected]=useState(null);const [showCreate,setShowCreate]=useState(false);const [showSettings,setShowSettings]=useState(false);const [hydrated,setHydrated]=useState(false);
  const {deviceId,syncStatus,debouncedSync,deleteFromCloud,pullFromCloud}=useSyncEngine();
  const save=useCallback((d,sync=true)=>{setData(d);LS.set(d);if(sync&&d.trips)d.trips.forEach(t=>debouncedSync(t));},[debouncedSync]);
  useEffect(()=>{const init=async()=>{const cloudTrips=await pullFromCloud();if(cloudTrips&&cloudTrips.length>0){const local=LS.get();const localTrips=local.trips||[];const merged=new Map();localTrips.forEach(t=>merged.set(t.id,t));cloudTrips.forEach(t=>merged.set(t.id,t));const newData={trips:Array.from(merged.values())};setData(newData);LS.set(newData);}setHydrated(true);};init();},[]);
  useEffect(()=>{const p=new URLSearchParams(window.location.search);const share=p.get('share');if(share){try{const trip=decShare(share);if(window.confirm(`🌍 Voyage partagé : "${trip.title}"\n\nImporter ?`)){const nt={...trip,id:uid(),title:trip.title+' (partagé)',created_at:new Date().toISOString()};save({...data,trips:[nt,...(data.trips||[])]});}}catch{}window.history.replaceState({},'',window.location.pathname);}if(window.location.search==='?action=new')setShowCreate(true);},[]);
  useEffect(()=>{if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});},[]);
  const createTrip=useCallback(async(t)=>{const nt={...t,id:uid(),flights:[],accommodations:[],activities:[],budget_items:[],checklist:genChecklist(t),created_at:new Date().toISOString()};if(!nt.lat&&nt.destination){const geo=await geocode(nt.destination);if(geo){nt.lat=geo.lat;nt.lng=geo.lng;}}save({...data,trips:[nt,...data.trips]});},[data,save]);
  const updateTrip=useCallback((updated)=>{const trips=data.trips.map(t=>t.id===updated.id?updated:t);save({...data,trips});setSelected(updated);},[data,save]);
  const deleteTrip=useCallback((id)=>{save({...data,trips:data.trips.filter(t=>t.id!==id)},false);deleteFromCloud(id);},[data,save,deleteFromCloud]);
  const importTrips=useCallback((imported)=>{const existing=new Map(data.trips.map(t=>[t.id,t]));imported.forEach(t=>existing.set(t.id,{...t,id:t.id||uid()}));save({...data,trips:Array.from(existing.values())});setShowSettings(false);},[data,save]);
  const handlePull=useCallback(async()=>{const cloudTrips=await pullFromCloud();if(cloudTrips){const merged=new Map(data.trips.map(t=>[t.id,t]));cloudTrips.forEach(t=>merged.set(t.id,t));const newData={...data,trips:Array.from(merged.values())};setData(newData);LS.set(newData);}},[data,pullFromCloud]);
  if(!hydrated)return(<div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}><div style={{fontSize:44}}>🌍</div><p style={{fontFamily:'Syne,sans-serif',fontSize:18,fontWeight:700}}>Palima Clone Plus</p><p className="pulse" style={{fontSize:13,color:C.t3}}>Chargement...</p></div>);
  const liveSelected=selected?data.trips.find(t=>t.id===selected.id)||selected:null;
  return(<>{liveSelected?(<TripDetail trip={liveSelected} onUpdate={updateTrip} onDelete={deleteTrip} onBack={()=>setSelected(null)} syncStatus={syncStatus}/>):(<Dashboard trips={data.trips} onCreate={()=>setShowCreate(true)} onSelect={setSelected} syncStatus={syncStatus} onSettings={()=>setShowSettings(true)}/>)}{showCreate&&<CreateTripWizard onSave={createTrip} onClose={()=>setShowCreate(false)}/>}{showSettings&&<SettingsModal deviceId={deviceId} trips={data.trips} onImport={importTrips} onClose={()=>setShowSettings(false)} onPull={handlePull} syncStatus={syncStatus}/>}</>);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
