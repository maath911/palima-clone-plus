<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#000000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Palima+"/>
<title>Palima Clone Plus</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%}
body{background:#000;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#0a0a0a}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
input,textarea,select{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;padding:12px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;width:100%;transition:border .2s,background .2s}
input:focus,textarea:focus,select:focus{border-color:#007AFF;background:rgba(0,122,255,.06)}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.28)}
select option{background:#1a1a1a;color:#fff}
button{cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:none;outline:none;transition:all .15s}
button:active{transform:scale(.97)}
input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#007AFF}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideFromBottom{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.fade-up{animation:fadeUp .3s ease forwards}
.slide-bottom{animation:slideFromBottom .38s cubic-bezier(.32,1,.23,1) forwards}
.scale-in{animation:scaleIn .25s ease forwards}
.slide-in{animation:slideIn .2s ease forwards}
.glass{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}
.spin{animation:spin .8s linear infinite}
.pulse{animation:pulse 1.5s ease-in-out infinite}
.leaflet-container{background:#0a0a0a !important;border-radius:16px}
.leaflet-tile{filter:brightness(.7) saturate(.6)}
.custom-pin{background:transparent;border:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ══ SUPABASE ══════════════════════════════════════════ */
const SB_URL='https://ntjfarocckcepwkgzrzb.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50amZhcm9jY2tjZXB3a2d6cnpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODI3NjksImV4cCI6MjA4OTc1ODc2OX0.VHOnQAwthE6uWOTWyCSpNdq5ZG59sUNfamVj4WuJiFM';
const sbFetch=async(path,opts={})=>{
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{...opts,headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})}});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
};
const SB={
  upsertTrip:async(did,trip)=>sbFetch('trips',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({device_id:did,trip_id:trip.id,data:trip})}),
  fetchTrips:async(did)=>sbFetch(`trips?device_id=eq.${encodeURIComponent(did)}&select=data,updated_at&order=updated_at.desc`),
  deleteTrip:async(did,tid)=>sbFetch(`trips?device_id=eq.${encodeURIComponent(did)}&trip_id=eq.${encodeURIComponent(tid)}`,{method:'DELETE'}),
};

/* ══ LOCAL STORAGE ══════════════════════════════════════ */
const LS_KEY='palima_plus_v3';
const LS={
  get:()=>{try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}')||{};}catch{return{};}},
  set:(d)=>localStorage.setItem(LS_KEY,JSON.stringify(d)),
  getDeviceId:()=>{let id=localStorage.getItem('palima_device_id');if(!id){id=crypto.randomUUID?crypto.randomUUID():`dev_${Date.now()}`;localStorage.setItem('palima_device_id',id);}return id;},
  getWeather:(dest)=>{try{const c=JSON.parse(localStorage.getItem('palima_wx_'+dest)||'null');if(!c)return null;if(Date.now()-c.ts>3600000*3)return null;return c.data;}catch{return null;}},
  setWeather:(dest,data)=>localStorage.setItem('palima_wx_'+dest,JSON.stringify({ts:Date.now(),data})),
};

/* ══ SYNC ENGINE ════════════════════════════════════════ */
const useSyncEngine=()=>{
  const deviceId=useMemo(()=>LS.getDeviceId(),[]);
  const [syncStatus,setSyncStatus]=useState('idle');
  const pendingRef=useRef(new Set());
  const timersRef=useRef({});
  const syncTrip=useCallback(async(trip)=>{
    if(!navigator.onLine){setSyncStatus('offline');return;}
    try{setSyncStatus('syncing');await SB.upsertTrip(deviceId,trip);pendingRef.current.delete(trip.id);setSyncStatus('synced');setTimeout(()=>setSyncStatus('idle'),2500);}
    catch{setSyncStatus('error');}
  },[deviceId]);
  const debouncedSync=useCallback((trip)=>{
    pendingRef.current.add(trip.id);clearTimeout(timersRef.current[trip.id]);
    timersRef.current[trip.id]=setTimeout(()=>syncTrip(trip),1200);
  },[syncTrip]);
  const deleteFromCloud=useCallback(async(tid)=>{if(navigator.onLine)try{await SB.deleteTrip(deviceId,tid);}catch{};},[deviceId]);
  const pullFromCloud=useCallback(async()=>{
    if(!navigator.onLine)return null;
    try{setSyncStatus('syncing');const rows=await SB.fetchTrips(deviceId);setSyncStatus('synced');setTimeout(()=>setSyncStatus('idle'),2500);return rows?.map(r=>r.data)||[];}
    catch{setSyncStatus('error');return null;}
  },[deviceId]);
  useEffect(()=>{
    const onOnline=async()=>{const d=LS.get();(d.trips||[]).forEach(t=>{if(pendingRef.current.has(t.id))syncTrip(t);});};
    window.addEventListener('online',onOnline);return()=>window.removeEventListener('online',onOnline);
  },[syncTrip]);
  return{deviceId,syncStatus,debouncedSync,deleteFromCloud,pullFromCloud};
};

/* ══ WEATHER HOOK ════════════════════════════════════════ */
const WX_CODE={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
const wxIcon=(c)=>WX_CODE[c]||'🌡️';
const useWeather=(destination,lat,lng)=>{
  const [wx,setWx]=useState(null);const [loading,setLoading]=useState(false);
  useEffect(()=>{
    if(!destination)return;
    const cached=LS.getWeather(destination);if(cached){setWx(cached);return;}
    const fetch_wx=async(la,lo)=>{
      try{
        const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7`);
        const d=await r.json();
        const days=(d.daily?.time||[]).slice(0,5).map((t,i)=>({date:t,code:d.daily.weathercode[i],max:Math.round(d.daily.temperature_2m_max[i]),min:Math.round(d.daily.temperature_2m_min[i])}));
        LS.setWeather(destination,days);setWx(days);
      }catch{}finally{setLoading(false);}
    };
    if(lat&&lng){fetch_wx(lat,lng);return;}
    setLoading(true);
    fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(destination)}&format=json&limit=1`)
      .then(r=>r.json()).then(d=>{if(d[0])fetch_wx(d[0].lat,d[0].lon);else setLoading(false);}).catch(()=>setLoading(false));
  },[destination,lat,lng]);
  return{wx,loading};
};

/* ══ GEOCODING ═══════════════════════════════════════════ */
const geocode=async(dest)=>{
  try{const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(dest)}&format=json&limit=1`);const d=await r.json();if(d[0])return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon),display:d[0].display_name};return null;}catch{return null;}
};

/* ══ CHECKLIST GENERATOR ═════════════════════════════════ */
const CHECKLIST_BASE=[
  {id:'passport',label:'Passeport valide (+ 6 mois)',cat:'documents',icon:'🛂'},
  {id:'ticket_print',label:'Billets d\'avion imprimés / sur téléphone',cat:'documents',icon:'✈️'},
  {id:'hotel_confirm',label:'Confirmation d\'hôtel',cat:'documents',icon:'🏨'},
  {id:'insurance',label:'Assurance voyage souscrite',cat:'documents',icon:'🛡️'},
  {id:'currency',label:'Monnaie locale / carte internationale',cat:'finance',icon:'💰'},
  {id:'phone_charge',label:'Téléphone chargé + chargeur',cat:'tech',icon:'🔋'},
  {id:'adapter',label:'Adaptateur secteur',cat:'tech',icon:'🔌'},
  {id:'luggage_lock',label:'Cadenas de valise',cat:'bagages',icon:'🔒'},
  {id:'toiletries',label:'Trousse de toilette (liquides <100ml)',cat:'bagages',icon:'🧴'},
  {id:'meds',label:'Médicaments personnels',cat:'santé',icon:'💊'},
  {id:'sim',label:'Carte SIM locale ou eSIM',cat:'tech',icon:'📱'},
  {id:'photos_id',label:'Photocopies des documents importants',cat:'documents',icon:'📄'},
  {id:'emergency_numbers',label:'Numéros d\'urgence notés',cat:'sécurité',icon:'🆘'},
  {id:'luggage_check',label:'Poids des bagages vérifié',cat:'bagages',icon:'⚖️'},
];

const genChecklist=(trip)=>{
  const items=[...CHECKLIST_BASE];
  const d=(trip.destination||'').toLowerCase();
  const isLong=(trip.end_date&&trip.start_date)&&(new Date(trip.end_date)-new Date(trip.start_date))>7*86400000;
  if(isLong)items.push({id:'extra_clothes',label:'Vêtements supplémentaires (long séjour)',cat:'bagages',icon:'👕'});
  const tropical=['thaïlande','bali','vietnam','cambodge','bénin','sénégal','kenya','tanzanie','réunion','martinique','guadeloupe'];
  if(tropical.some(x=>d.includes(x)))items.push({id:'repellent',label:'Répulsif anti-moustiques',cat:'santé',icon:'🦟'},{id:'sunscreen',label:'Crème solaire haute protection',cat:'santé',icon:'🌞'});
  const cold=['islande','norvège','canada','alaska','suède','finlande'];
  if(cold.some(x=>d.includes(x)))items.push({id:'winter_coat',label:'Manteau d\'hiver / sous-vêtements thermiques',cat:'bagages',icon:'🧥'});
  const schengen=['espagne','italie','allemagne','portugal','grèce','pays-bas','autriche','suisse'];
  const needVisa=!schengen.some(x=>d.includes(x))&&!d.includes('france');
  if(needVisa)items.push({id:'visa',label:'Vérifier si visa requis',cat:'documents',icon:'📋'});
  return items.map(i=>({...i,checked:false}));
};

/* ══ SMART SUGGESTIONS ═══════════════════════════════════ */
const SmartSuggestions=({trip})=>{
  const sugg=[];
  const fl=trip.flights||[];const ho=trip.accommodations||[];const ac=trip.activities||[];
  const now=new Date();const start=trip.start_date?new Date(trip.start_date):null;
  const daysUntil=start?Math.ceil((start-now)/86400000):null;
  if(fl.length===0&&trip.destination)sugg.push({id:'no_flight',icon:'✈️',text:`Aucun vol pour ${trip.destination}`,action:'Chercher sur Skyscanner',href:`https://www.skyscanner.fr/transport/vols/FR/${trip.destination_iata||encodeURIComponent(trip.destination)}/${trip.start_date?trip.start_date.replace(/-/g,''):''}`,color:'#007AFF'});
  if(ho.length===0&&trip.destination)sugg.push({id:'no_hotel',icon:'🏨',text:`Pas d'hébergement enregistré`,action:'Voir Booking.com',href:`https://www.booking.com/searchresults.fr.html?ss=${encodeURIComponent(trip.destination)}&checkin=${trip.start_date||''}&checkout=${trip.end_date||''}`,color:'#BF5AF2'});
  if(!trip.total_budget||trip.total_budget===0)sugg.push({id:'no_budget',icon:'💰',text:'Budget non défini',action:'Définir un budget',href:null,color:'#FF9F0A'});
  if(daysUntil!==null&&daysUntil<=7&&daysUntil>=0&&(trip.checklist||[]).filter(c=>c.checked).length<3)sugg.push({id:'checklist',icon:'✅',text:`Départ dans ${daysUntil}j — checklist incomplète`,action:'Voir la checklist',href:null,color:'#30D158'});
  if(sugg.length===0)return null;
  return(
    <div style={{marginBottom:16}}>
      <p style={{fontSize:11,color:'rgba(255,255,255,.3)',fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,marginBottom:10}}>💡 Suggestions</p>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {sugg.map(s=>(
          <div key={s.id} className="scale-in" style={{background:s.color+'12',border:`1px solid ${s.color}30`,borderRadius:14,padding:'12px 16px',display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:20,flexShrink:0}}>{s.icon}</span>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:13,fontWeight:600,marginBottom:2}}>{s.text}</p>
              {s.href?(
                <a href={s.href} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:s.color,fontWeight:600,textDecoration:'none',display:'flex',alignItems:'center',gap:4}}>
                  {s.action} <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                </a>
              ):<p style={{fontSize:12,color:s.color,fontWeight:600}}>{s.action}</p>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ══ WEATHER WIDGET ══════════════════════════════════════ */
const WeatherWidget=({trip})=>{
  const {wx,loading}=useWeather(trip.destination,trip.lat,trip.lng);
  const startDate=trip.start_date;
  if(loading)return(<div className="glass" style={{borderRadius:16,padding:'14px 18px',marginBottom:16}}><p className="pulse" style={{fontSize:13,color:'rgba(255,255,255,.3)'}}>☁️ Chargement météo...</p></div>);
  if(!wx||wx.length===0)return null;
  const relevant=startDate?wx.filter(d=>d.date>=startDate).slice(0,5):wx.slice(0,5);
  if(relevant.length===0)return null;
  return(
    <div className="glass" style={{borderRadius:16,padding:'14px 18px',marginBottom:16}}>
      <p style={{fontSize:11,color:'rgba(255,255,255,.3)',fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,marginBottom:12}}>🌤️ Météo prévue — {trip.destination}</p>
      <div style={{display:'flex',gap:6,overflowX:'auto',scrollbarWidth:'none',paddingBottom:4}}>
        {relevant.map(d=>{
          const dt=new Date(d.date+'T00:00:00');
          const label=dt.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric'});
          return(
            <div key={d.date} style={{flex:'0 0 auto',textAlign:'center',background:'rgba(255,255,255,.04)',borderRadius:12,padding:'10px 12px',minWidth:62}}>
              <p style={{fontSize:10,color:'rgba(255,255,255,.4)',marginBottom:6,whiteSpace:'nowrap'}}>{label}</p>
              <p style={{fontSize:22,marginBottom:6}}>{wxIcon(d.code)}</p>
              <p style={{fontSize:12,fontWeight:700,color:'#fff'}}>{d.max}°</p>
              <p style={{fontSize:11,color:'rgba(255,255,255,.4)'}}>{d.min}°</p>
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* ══ MAP VIEW ════════════════════════════════════════════ */
const MapView=({trip})=>{
  const mapRef=useRef(null);
  const mapInstanceRef=useRef(null);
  const ho=trip.accommodations||[];
  const ac=trip.activities||[];

  useEffect(()=>{
    if(!mapRef.current||mapInstanceRef.current)return;
    const initMap=async()=>{
      let centerLat=trip.lat;let centerLng=trip.lng;
      if(!centerLat&&trip.destination){
        const geo=await geocode(trip.destination);
        if(geo){centerLat=geo.lat;centerLng=geo.lng;}
      }
      if(!centerLat)return;
      const map=L.map(mapRef.current,{zoomControl:true,scrollWheelZoom:false}).setView([centerLat,centerLng],12);
      mapInstanceRef.current=map;
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
      const makePin=(emoji,color)=>L.divIcon({html:`<div style="width:36px;height:36px;background:${color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.3)"><span style="transform:rotate(45deg);font-size:16px">${emoji}</span></div>`,iconSize:[36,36],iconAnchor:[18,36],className:'custom-pin'});
      ho.forEach(h=>{
        if(h.latitude&&h.longitude)L.marker([h.latitude,h.longitude],{icon:makePin('🏨','#BF5AF2')}).addTo(map).bindPopup(`<b>${h.name}</b><br/>${h.type}`);
      });
      ac.forEach(a=>{
        if(a.latitude&&a.longitude)L.marker([a.latitude,a.longitude],{icon:makePin(CAT_I[a.category]||'📌','#30D158')}).addTo(map).bindPopup(`<b>${a.title}</b><br/>${a.date||''}`);
      });
    };
    initMap();
    return()=>{if(mapInstanceRef.current){mapInstanceRef.current.remove();mapInstanceRef.current=null;}};
  },[trip.destination,trip.lat,trip.lng]);

  const hasLocations=ho.some(h=>h.latitude)||ac.some(a=>a.latitude);

  return(
    <div className="fade-up">
      <div style={{height:320,borderRadius:16,overflow:'hidden',marginBottom:14}} ref={mapRef}/>
      {!hasLocations&&(
        <div className="glass" style={{borderRadius:14,padding:'14px 18px'}}>
          <p style={{fontSize:13,color:'rgba(255,255,255,.4)',textAlign:'center',lineHeight:1.6}}>
            📍 Les pins apparaîtront quand tu ajouteras des coordonnées à tes hébergements et activités.
          </p>
        </div>
      )}
      {(ho.length>0||ac.length>0)&&(
        <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:10}}>
          {ho.map(h=>(<div key={h.id} style={{background:'#BF5AF222',border:'1px solid #BF5AF240',borderRadius:10,padding:'6px 12px',fontSize:12,color:'#BF5AF2',display:'flex',alignItems:'center',gap:6}}><span>🏨</span>{h.name}</div>))}
          {ac.slice(0,4).map(a=>(<div key={a.id} style={{background:'#30D15822',border:'1px solid #30D15840',borderRadius:10,padding:'6px 12px',fontSize:12,color:'#30D158',display:'flex',alignItems:'center',gap:6}}><span>{CAT_I[a.category]||'📌'}</span>{a.title}</div>))}
        </div>
      )}
    </div>
  );
};

/* ══ CHECKLIST TAB ═══════════════════════════════════════ */
const ChecklistTab=({trip,onUpdate})=>{
  const checklist=trip.checklist||genChecklist(trip);
  const toggle=(id)=>{
    const updated=checklist.map(i=>i.id===id?{...i,checked:!i.checked}:i);
    onUpdate({...trip,checklist:updated});
  };
  const done=checklist.filter(c=>c.checked).length;
  const pct=checklist.length>0?Math.round((done/checklist.length)*100):0;
  const cats=[...new Set(checklist.map(c=>c.cat))];
  return(
    <div className="fade-up">
      <div className="glass" style={{borderRadius:16,padding:'16px 20px',marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div><p style={{fontFamily:'Syne,sans-serif',fontSize:22,fontWeight:800}}>{done}/{checklist.length}</p><p style={{fontSize:12,color:'rgba(255,255,255,.4)',marginTop:2}}>items complétés</p></div>
          <div style={{textAlign:'right'}}><p style={{fontFamily:'Syne,sans-serif',fontSize:26,fontWeight:800,color:pct===100?'#30D158':pct>60?'#FF9F0A':'#007AFF'}}>{pct}%</p><p style={{fontSize:12,color:'rgba(255,255,255,.4)',marginTop:2}}>{pct===100?'✅ Prêt à partir !':'Complète la liste'}</p></div>
        </div>
        <div style={{background:'rgba(255,255,255,.08)',borderRadius:8,height:10,overflow:'hidden'}}>
          <div style={{width:pct+'%',height:'100%',background:pct===100?'#30D158':pct>60?'#FF9F0A':'#007AFF',borderRadius:8,transition:'width .5s ease'}}/>
        </div>
      </div>
      {cats.map(cat=>(
        <div key={cat} style={{marginBottom:14}}>
          <p style={{fontSize:11,color:'rgba(255,255,255,.3)',fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>{cat}</p>

            {checklist.filter(c=>c.cat===cat).map(item=>(
              <button key={item.id} onClick={()=>toggle(item.id)} style={{background:item.checked?'rgba(48,209,88,.1)':'rgba(255,255,255,.04)',border:`1px solid ${item.checked?'rgba(48,209,88,.3)':'rgba(255,255,255,.08)'}`,borderRadius:14,padding:'13px 16px',display:'flex',alignItems:'center',gap:12,textAlign:'left',transition:'all .18s'}}>
                <span style={{fontSize:20,flexShrink:0}}>{item.icon}</span>
                <span style={{flex:1,fontSize:14,color:item.checked?'rgba(255,255,255,.5)':'#fff',textDecoration:item.checked?'line-through':'none',transition:'all .18s'}}>{item.label}</span>

              </button>
            ))}

        </div>
      ))}
    </div>
  );
};

/* ══ WIZARD ══════════════════════════════════════════════ */
const WIZARD_STEPS=[
  {id:'destination',title:'Où vas-tu ?',icon:'📍',desc:'Destination et dates du voyage'},
  {id:'budget',title:'Budget',icon:'💰',desc:'Définir ton enveloppe (optionnel)'},
  {id:'style',title:'Personnalise',icon:'🎨',desc:'Emoji, notes, statut'},
  {id:'recap',title:'Récapitulatif',icon:'🚀',desc:'Tout est bon ?'},
];

const CreateTripWizard=({onSave,onClose,existing})=>{
  const [step,setStep]=useState(0);
  const [t,setT]=useState(existing||{title:'',destination:'',destination_iata:'',start_date:'',end_date:'',total_budget:'',currency:'EUR',status:'planning',cover_emoji:'✈️',notes:''});
  const [geocoding,setGeocoding]=useState(false);
  const s=(k,v)=>setT(p=>({...p,[k]:v}));

  const handleDestinationBlur=async()=>{
    if(!t.destination||t.lat)return;
    setGeocoding(true);
    const geo=await geocode(t.destination);
    if(geo){setT(p=>({...p,lat:geo.lat,lng:geo.lng}));}
    setGeocoding(false);
  };

  const canProceed=()=>{
    if(step===0)return t.title.length>0&&t.destination.length>0&&t.start_date.length>0;
    return true;
  };

  const save=()=>{if(!t.title||!t.destination||!t.start_date){alert('Titre, destination et date requis');return;}onSave({...t,total_budget:+t.total_budget||0});onClose();};

  const dur=t.start_date&&t.end_date?daysCount(t.start_date,t.end_date):0;

  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} className="slide-bottom" style={{background:C.s2,borderRadius:'24px 24px 0 0',width:'100%',maxWidth:520,maxHeight:'92vh',overflowY:'auto',padding:'24px 22px 56px'}}>
        {/* Progress */}
        <div style={{display:'flex',gap:4,marginBottom:24}}>
          {WIZARD_STEPS.map((ws,i)=>(
            <div key={ws.id} style={{flex:1,height:4,borderRadius:4,background:i<=step?C.accent:'rgba(255,255,255,.1)',transition:'background .3s'}}/>
          ))}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div>
            <p style={{fontSize:11,color:C.accent,fontWeight:700,textTransform:'uppercase',letterSpacing:1.5,marginBottom:4}}>Étape {step+1}/{WIZARD_STEPS.length}</p>
            <h2 style={{fontFamily:'Syne,sans-serif',fontSize:22,fontWeight:800}}>{WIZARD_STEPS[step].icon} {WIZARD_STEPS[step].title}</h2>
            <p style={{fontSize:13,color:C.t2,marginTop:3}}>{WIZARD_STEPS[step].desc}</p>
          </div>
          <button onClick={onClose} style={{background:C.s3,borderRadius:10,color:C.t2,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{I.x}</button>
        </div>

        {/* Step 0 — Destination */}
        {step===0&&(
          <div className="slide-in">
            <Field label="Titre du voyage *"><input value={t.title} onChange={e=>s('title',e.target.value)} placeholder="Mon aventure à Tokyo..."/></Field>
            <Field label="Destination *">
              <div style={{position:'relative'}}>
                <input value={t.destination} onChange={e=>s('destination',e.target.value)} onBlur={handleDestinationBlur} placeholder="Tokyo, Japon"/>
                {geocoding&&<span className="spin" style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',display:'inline-block',width:14,height:14,border:`2px solid ${C.accent}`,borderTopColor:'transparent',borderRadius:'50%'}}/>}
                {t.lat&&!geocoding&&<span style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',fontSize:12,color:C.green}}>📍</span>}
              </div>
            </Field>
            <Field label="Code IATA aéroport (optionnel)"><input value={t.destination_iata} onChange={e=>s('destination_iata',e.target.value.toUpperCase())} maxLength={3} placeholder="TYO"/></Field>
            <Row>
              <Field label="Date de départ *" half><input type="date" value={t.start_date} onChange={e=>s('start_date',e.target.value)}/></Field>
              <Field label="Date de retour" half><input type="date" value={t.end_date} onChange={e=>s('end_date',e.target.value)}/></Field>
            </Row>
            {dur>0&&<div style={{background:C.accent+'15',border:`1px solid ${C.accent}30`,borderRadius:12,padding:'10px 14px',marginBottom:8}}><p style={{fontSize:13,color:C.accent,fontWeight:600}}>✈️ Voyage de {dur} jour{dur>1?'s':''}</p></div>}
          </div>
        )}

        {/* Step 1 — Budget */}
        {step===1&&(
          <div className="slide-in">
            <div style={{background:C.glass,border:`1px solid ${C.border}`,borderRadius:16,padding:'16px 18px',marginBottom:16}}>
              <p style={{fontSize:13,color:C.t2,lineHeight:1.6,marginBottom:8}}>💡 Définir un budget te permettra de suivre tes dépenses et recevoir une alerte si tu dépasses.</p>
              <p style={{fontSize:12,color:C.t3}}>Tu peux passer cette étape et définir le budget plus tard.</p>
            </div>
            <Row>
              <Field label="Budget total" half><input type="number" value={t.total_budget} onChange={e=>s('total_budget',e.target.value)} placeholder="2000"/></Field>
              <Field label="Devise" half><select value={t.currency} onChange={e=>s('currency',e.target.value)}>{CURRENCIES.map(c=><option key={c} value={c}>{c}</option>)}</select></Field>
            </Row>
            <Field label="Statut du voyage"><select value={t.status} onChange={e=>s('status',e.target.value)}><option value="planning">🔵 En préparation</option><option value="ongoing">🟢 En cours</option><option value="completed">⚪ Terminé</option></select></Field>
          </div>
        )}

        {/* Step 2 — Style */}
        {step===2&&(
          <div className="slide-in">
            <div style={{marginBottom:16}}>
              <label style={{fontSize:12,color:C.t2,marginBottom:8,display:'block',fontWeight:500}}>Emoji du voyage</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {EMOJIS.map(e=>(<button key={e} onClick={()=>s('cover_emoji',e)} style={{fontSize:22,background:t.cover_emoji===e?C.accent+'30':'rgba(255,255,255,.05)',border:`2px solid ${t.cover_emoji===e?C.accent:C.border}`,borderRadius:10,padding:'6px 9px',transition:'all .15s'}}>{e}</button>))}
              </div>
            </div>
            <Field label="Notes personnelles"><textarea value={t.notes} onChange={e=>s('notes',e.target.value)} placeholder="Idées, rappels, infos pratiques..." rows={4} style={{resize:'none'}}/></Field>
          </div>
        )}

        {/* Step 3 — Recap */}
        {step===3&&(
          <div className="slide-in">
            <div style={{background:C.glass,border:`1px solid ${C.border}`,borderRadius:20,padding:'20px',marginBottom:16}}>

const HotelForm=({trip,onAdd,onClose})=>{

/* ══ SETTINGS MODAL ══════════════════════════════════════ */
const SettingsModal=({deviceId,trips,onImport,onClose,onPull,syncStatus})=>{
  const fileRef=useRef();const [copied,setCopied]=useState(false);const [pulling,setPulling]=useState(false);const [msg,setMsg]=useState('');
  const copyId=()=>{navigator.clipboard.writeText(deviceId).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),2000);};
  const exportAll=()=>{const blob=new Blob([JSON.stringify({version:3,exported_at:new Date().toISOString(),device_id:deviceId,trips},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`palima-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();};
  const handleImport=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);onImport(d.trips||[]);setMsg(`✅ ${(d.trips||[]).length} voyage(s) importé(s) !`);setTimeout(()=>setMsg(''),3000);}catch{setMsg('❌ Fichier invalide');}};r.readAsText(file);e.target.value='';};
  const handlePull=async()=>{setPulling(true);await onPull();setPulling(false);};
  return(
    <Modal onClose={onClose} title="Paramètres & Sauvegarde" icon="⚙️">
      <div className="glass" style={{borderRadius:16,padding:'16px 18px',marginBottom:14}}>
        <p style={{fontSize:13,fontWeight:600,marginBottom:3}}>🔑 Mon code appareil</p>
        <p style={{fontSize:11,color:C.t3,lineHeight:1.5,marginBottom:10}}>Note ce code pour récupérer tes données sur un autre téléphone.</p>
        <div style={{background:C.s3,borderRadius:10,padding:'10px 14px',fontFamily:'monospace',fontSize:11,color:C.teal,wordBreak:'break-all',marginBottom:10}}>{deviceId}</div>
        <Btn sm outline onClick={copyId} style={{width:'100%'}}>{copied?I.check:I.copy} {copied?'Copié !':'Copier'}</Btn>
      </div>
      <div className="glass" style={{borderRadius:16,padding:'16px 18px',marginBottom:14}}>
        <p style={{fontSize:13,fontWeight:600,marginBottom:4}}>☁️ Supabase Sync</p>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:12}}>
          <SyncBadge status={syncStatus}/>
          <Btn sm onClick={handlePull} loading={pulling} color={C.teal}>{I.cloud} Restaurer cloud</Btn>
        </div>
      </div>
      <div className="glass" style={{borderRadius:16,padding:'16px 18px'}}>
        <p style={{fontSize:13,fontWeight:600,marginBottom:4}}>📦 Sauvegarde locale JSON</p>
        {msg&&<p style={{fontSize:13,marginBottom:10,fontWeight:600}}>{msg}</p>}
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <Btn full onClick={exportAll} color={C.green}>{I.dl} Exporter tous les voyages</Btn>
          <button onClick={()=>fileRef.current.click()} style={{background:C.glass,border:`1px solid ${C.border}`,borderRadius:13,color:C.t1,padding:'13px 22px',fontWeight:600,fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>{I.upload} Importer JSON</button>
          <input ref={fileRef} type="file" accept=".json" onChange={handleImport} style={{display:'none'}}/>
        </div>
      </div>
      <p style={{fontSize:11,color:C.t3,textAlign:'center',marginTop:14,lineHeight:1.6}}>Palima Clone Plus v3 · 100% gratuit · localStorage + Supabase</p>
    </Modal>
  );
};

/* ══ TRIP DETAIL ═════════════════════════════════════════ */
function TripDetail({trip,onUpdate,onDelete,onBack,syncStatus}){
  const [tab,setTab]=useState('overview');
  const [modal,setModal]=useState(null);
  const [copied,setCopied]=useState(false);

  const add=(key,item)=>onUpdate({...trip,[key]:[...(trip[key]||[]),item]});
  const rm=(key,id)=>onUpdate({...trip,[key]:(trip[key]||[]).filter(x=>x.id!==id)});

  const fl=trip.flights||[];const ho=trip.accommodations||[];const ac=trip.activities||[];const bi=trip.budget_items||[];
  const flCost=fl.reduce((s,f)=>s+(+f.price||0),0);
  const hoCost=ho.reduce((s,h)=>s+(+h.total_price||0),0);
  const acCost=ac.reduce((s,a)=>s+(+a.price||0),0);
  const biCost=bi.reduce((s,b)=>s+(b.actual!=null?+b.actual:+b.estimated||0),0);
  const total=flCost+hoCost+acCost+biCost;
  const budget=+trip.total_budget||0;
  const pct=budget>0?Math.min(100,(total/budget)*100):0;
  const tripDur=daysCount(trip.start_date,trip.end_date);
  const checkDone=(trip.checklist||[]).filter(c=>c.checked).length;
  const checkTotal=(trip.checklist||genChecklist(trip)).length;

  const shareLink=()=>{const url=`${location.origin}${location.pathname}?share=${encShare(trip)}`;navigator.clipboard.writeText(url).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),2500);};

  const TABS=[
    {id:'overview',icon:'📋',label:'Résumé'},
    {id:'flights',icon:'✈️',label:`Vols${fl.length?`(${fl.length})`:''}`},
    {id:'hotels',icon:'🏨',label:`Héberg.${ho.length?`(${ho.length})`:''}`},
    {id:'activities',icon:'🎯',label:`Activités${ac.length?`(${ac.length})`:''}`},
    {id:'budget',icon:'💰',label:'Budget'},
    {id:'map',icon:'🗺️',label:'Carte'},
    {id:'checklist',icon:'✅',label:`Check${checkDone>0?`(${checkDone}/${checkTotal})`:''}`},
  ];

  return(
    <div style={{minHeight:'100vh',background:C.bg,paddingBottom:32}}>
      {/* Sticky header */}
      <div style={{background:'linear-gradient(180deg,#0a0a14 0%,#000 100%)',padding:'20px 18px 0',position:'sticky',top:0,zIndex:50}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <button onClick={onBack} style={{background:C.glass,border:`1px solid ${C.border}`,borderRadius:12,color:C.t1,padding:'8px 16px',display:'flex',alignItems:'center',gap:6,fontSize:14,fontWeight:500}}>
            {I.back} Retour
          </button>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <SyncBadge status={syncStatus}/>
            <button onClick={()=>setModal('share')} style={{background:C.glass,border:`1px solid ${C.border}`,borderRadius:12,color:C.t2,width:38,height:38,display:'flex',alignItems:'center',justifyContent:'center'}}>{I.share}</button>
            <button onClick={()=>setModal('edit')} style={{background:C.accent+'20',border:`1px solid ${C.accent}40`,borderRadius:12,color:C.accent,padding:'8px 14px',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:6}}>{I.edit}</button>
            <button onClick={()=>{if(window.confirm(`Supprimer "${trip.title}" ?`)){onDelete(trip.id);onBack();}}} style={{background:C.red+'18',border:`1px solid ${C.red}30`,borderRadius:12,color:C.red,width:38,height:38,display:'flex',alignItems:'center',justifyContent:'center'}}>{I.trash}</button>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:8}}>
            <div style={{fontSize:36,background:C.s3,borderRadius:16,padding:'8px 12px',flexShrink:0}}>{trip.cover_emoji}</div>
            <div style={{flex:1,minWidth:0}}>
              <h1 style={{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:800,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{trip.title}</h1>
              <p style={{color:C.t2,fontSize:13,marginTop:3}}>📍 {trip.destination}{tripDur>0?` · ${tripDur}j`:''}</p>
            </div>
          </div>
          <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center'}}>
            <Tag color={STATUS_C[trip.status]}>{STATUS_L[trip.status]}</Tag>
            {trip.start_date&&<Tag color={C.t3}>{fd(trip.start_date)}{trip.end_date?` → ${fd(trip.end_date)}`:''}</Tag>}
            {budget>0&&<Tag color={pct>90?C.red:pct>70?C.orange:C.green}>{fc(total,trip.currency)}/{fc(budget,trip.currency)}</Tag>}
          </div>
        </div>
        <div style={{display:'flex',gap:4,overflowX:'auto',paddingBottom:2,scrollbarWidth:'none'}}>
          {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?C.accent:'transparent',color:tab===t.id?'#fff':C.t2,border:`1px solid ${tab===t.id?C.accent:C.border}`,borderRadius:10,padding:'7px 11px',fontSize:11,fontWeight:600,whiteSpace:'nowrap',flexShrink:0,transition:'all .18s'}}>{t.icon} {t.label}</button>))}
        </div>
      </div>

      <div style={{padding:'18px 18px 0'}}>
        {/* OVERVIEW */}
        {tab==='overview'&&(
          <div className="fade-up">
            <SmartSuggestions trip={trip}/>
            <WeatherWidget trip={trip}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              {[{l:'Vols',v:fl.length,i:'✈️',c:C.accent,s:fc(flCost,trip.currency)},{l:'Nuitées',v:ho.reduce((s,h)=>s+nights(h.check_in,h.check_out),0),i:'🌙',c:C.purple,s:fc(hoCost,trip.currency)},{l:'Activités',v:ac.length,i:'🎯',c:C.green,s:fc(acCost,trip.currency)},{l:'Total',v:fc(total,trip.currency),i:'💰',c:pct>90?C.red:C.orange,s:budget?`/${fc(budget,trip.currency)}`:''}].map(x=>(
                <div key={x.l} className="glass" style={{borderRadius:16,padding:'14px 16px'}}>
                  <span style={{fontSize:20}}>{x.i}</span>
                  <div style={{fontFamily:'Syne,sans-serif',fontSize:x.l==='Total'?14:23,fontWeight:700,color:x.c,marginTop:7,wordBreak:'break-all'}}>{x.v}</div>
                  {x.s&&<div style={{fontSize:11,color:C.t2,marginTop:2}}>{x.s}</div>}
                  <div style={{fontSize:11,color:C.t3,marginTop:3}}>{x.l}</div>
                </div>
              ))}
            </div>
            {budget>0&&(
              <div className="glass" style={{borderRadius:16,padding:'16px 20px',marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><span style={{fontSize:13,fontWeight:600}}>Budget</span><span style={{fontSize:13,fontWeight:700,color:pct>90?C.red:pct>70?C.orange:C.green}}>{Math.round(pct)}%</span></div>

/* ══ DASHBOARD ═══════════════════════════════════════════ */
function Dashboard({trips,onCreate,onSelect,syncStatus,onSettings}){
  const now=new Date();
  const ongoing=trips.filter(t=>t.status==='ongoing');
  const upcoming=trips.filter(t=>t.status==='planning'&&t.start_date&&new Date(t.start_date)>now);
  const past=trips.filter(t=>t.status==='completed'||(t.end_date&&new Date(t.end_date)<now&&t.status!=='planning'));
  const other=trips.filter(t=>!ongoing.includes(t)&&!upcoming.includes(t)&&!past.includes(t));

  const TripCard=({trip,i})=>{
    const fl=trip.flights||[];const ho=trip.accommodations||[];const ac=trip.activities||[];const bi=trip.budget_items||[];
    const total=fl.reduce((s,f)=>s+(+f.price||0),0)+ho.reduce((s,h)=>s+(+h.total_price||0),0)+ac.reduce((s,a)=>s+(+a.price||0),0)+bi.reduce((s,b)=>s+(b.actual!=null?+b.actual:+b.estimated||0),0);
    const budget=+trip.total_budget||0;const pct=budget>0?Math.min(100,(total/budget)*100):0;
    const d=daysCount(trip.start_date,trip.end_date);
    const start=trip.start_date?new Date(trip.start_date):null;
    const daysUntil=start&&start>now?Math.ceil((start-now)/86400000):null;
    const checkList=trip.checklist||[];const checkDone=checkList.filter(c=>c.checked).length;
    return(
      <div onClick={()=>onSelect(trip)} className="fade-up glass" style={{borderRadius:20,padding:'18px 20px',cursor:'pointer',animationDelay:i*.05+'s',transition:'border-color .2s'}}
        onMouseEnter={e=>e.currentTarget.style.borderColor=C.accent+'50'} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div style={{display:'flex',gap:14,alignItems:'center',flex:1,minWidth:0}}>
            <div style={{fontSize:32,background:C.s3,borderRadius:14,padding:'8px 12px',flexShrink:0}}>{trip.cover_emoji}</div>
            <div style={{flex:1,minWidth:0}}>
              <h3 style={{fontFamily:'Syne,sans-serif',fontSize:17,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{trip.title}</h3>
              <p style={{fontSize:13,color:C.t2,marginTop:3}}>📍 {trip.destination}{d>0?` · ${d}j`:''}</p>
              {daysUntil!==null&&<p style={{fontSize:11,color:daysUntil<=7?C.orange:C.accent,marginTop:3,fontWeight:600}}>⏳ Dans {daysUntil} jour{daysUntil>1?'s':''}</p>}
            </div>
          </div>
          <Tag color={STATUS_C[trip.status]} sm>{STATUS_L[trip.status]}</Tag>
        </div>
        <div style={{display:'flex',gap:12,marginTop:12,fontSize:12,color:C.t2,flexWrap:'wrap',alignItems:'center'}}>
          {fl.length>0&&<span>✈️ {fl.length}</span>}
          {ho.length>0&&<span>🏨 {ho.length}</span>}
          {ac.length>0&&<span>🎯 {ac.length}</span>}
          {checkList.length>0&&<span style={{color:checkDone===checkList.length?C.green:C.t2}}>✅ {checkDone}/{checkList.length}</span>}
          {budget>0&&<span style={{marginLeft:'auto',color:pct>90?C.red:C.accent,fontWeight:600}}>{fc(total,trip.currency)}/{fc(budget,trip.currency)}</span>}
        </div>
        {budget>0&&<div style={{background:C.s3,borderRadius:4,height:4,marginTop:10,overflow:'hidden'}}><div style={{width:pct+'%',height:'100%',background:pct>90?C.red:pct>70?C.orange:C.accent,borderRadius:4,transition:'width .4s'}}/></div>}
      </div>
    );
  };

  const Section=({title,list})=>list.length===0?null:(
    <div style={{marginBottom:24}}><p style={{fontSize:11,color:C.t3,fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,marginBottom:12}}>{title}</p><div style={{display:'flex',flexDirection:'column',gap:10}}>{list.map((t,i)=><TripCard key={t.id} trip={t} i={i}/>)}</div></div>
  );

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <div style={{background:'linear-gradient(160deg,#0a0a1f 0%,#060610 50%,#000 100%)',padding:'52px 22px 32px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-60,right:-60,width:200,height:200,background:C.accent+'08',borderRadius:'50%',filter:'blur(40px)'}}/>
        <div style={{position:'absolute',bottom:-40,left:-40,width:150,height:150,background:C.purple+'08',borderRadius:'50%',filter:'blur(30px)'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
          <div>
            <p style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:2.5,textTransform:'uppercase',marginBottom:4}}>Palima Clone Plus ✦ v3</p>
            <h1 style={{fontFamily:'Syne,sans-serif',fontSize:32,fontWeight:800,lineHeight:1.1}}>Mes voyages</h1>
          </div>
          <button onClick={onSettings} style={{background:C.glass,border:`1px solid ${C.border}`,borderRadius:14,color:C.t2,width:42,height:42,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(10px)',flexShrink:0}}>
            {I.settings}
          </button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:24}}>
          <p style={{fontSize:14,color:C.t2}}>Météo · Carte · Checklist · Budget</p>
          <SyncBadge status={syncStatus}/>
        </div>
        <Btn onClick={onCreate}>{I.plus} Nouveau voyage</Btn>
        {trips.length>0&&(
          <div style={{display:'flex',gap:20,marginTop:24,paddingTop:20,borderTop:`1px solid ${C.border}`}}>
            {[{l:'Voyages',v:trips.length},{l:'En cours',v:ongoing.length},{l:'Planifiés',v:upcoming.length}].map(x=>(<div key={x.l}><p style={{fontFamily:'Syne,sans-serif',fontSize:22,fontWeight:800}}>{x.v}</p><p style={{fontSize:12,color:C.t3}}>{x.l}</p></div>))}
          </div>
        )}
      </div>
      <div style={{padding:'24px 18px'}}>
        {trips.length===0?(
          <div style={{textAlign:'center',padding:'60px 20px'}}>
            <div style={{fontSize:60,marginBottom:20}}>🌍</div>
            <h2 style={{fontFamily:'Syne,sans-serif',fontSize:22,color:C.t2,marginBottom:10}}>Aucun voyage</h2>
            <p style={{fontSize:14,color:C.t3,lineHeight:1.7,maxWidth:280,margin:'0 auto 28px'}}>Crée ton premier voyage et laisse-toi guider étape par étape.</p>
            <Btn onClick={onCreate}>{I.plus} Créer mon premier voyage</Btn>
          </div>
        ):(
          <><Section title="🟢 En cours" list={ongoing}/><Section title="🔵 À venir" list={upcoming}/><Section title="📦 Autres" list={other}/><Section title="✅ Terminés" list={past}/></>
        )}
      </div>
    </div>
  );
}

/* ══ APP ROOT ════════════════════════════════════════════ */
function App(){
  const [data,setData]=useState(()=>{const d=LS.get();return{trips:d.trips||[]};});
  const [selected,setSelected]=useState(null);
  const [showCreate,setShowCreate]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [hydrated,setHydrated]=useState(false);
  const {deviceId,syncStatus,debouncedSync,deleteFromCloud,pullFromCloud}=useSyncEngine();

  const save=useCallback((d,sync=true)=>{setData(d);LS.set(d);if(sync&&d.trips)d.trips.forEach(t=>debouncedSync(t));},[debouncedSync]);

  useEffect(()=>{
    const init=async()=>{
      const cloudTrips=await pullFromCloud();
      if(cloudTrips&&cloudTrips.length>0){
        const local=LS.get();const localTrips=local.trips||[];
        const merged=new Map();localTrips.forEach(t=>merged.set(t.id,t));cloudTrips.forEach(t=>merged.set(t.id,t));
        const newData={trips:Array.from(merged.values())};setData(newData);LS.set(newData);
      }
      setHydrated(true);
    };
    init();
  },[]);

  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);const share=p.get('share');
    if(share){try{const trip=decShare(share);if(window.confirm(`🌍 Voyage partagé : "${trip.title}"\n\nImporter ?`)){const nt={...trip,id:uid(),title:trip.title+' (partagé)',created_at:new Date().toISOString()};save({...data,trips:[nt,...(data.trips||[])]});}}catch{}window.history.replaceState({},'',window.location.pathname);}
    if(window.location.search==='?action=new')setShowCreate(true);
  },[]);

  useEffect(()=>{if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});},[]);

  const createTrip=useCallback(async(t)=>{
    const nt={...t,id:uid(),flights:[],accommodations:[],activities:[],budget_items:[],checklist:genChecklist(t),created_at:new Date().toISOString()};
    if(!nt.lat&&nt.destination){const geo=await geocode(nt.destination);if(geo){nt.lat=geo.lat;nt.lng=geo.lng;}}
    const newData={...data,trips:[nt,...data.trips]};save(newData);
  },[data,save]);

  const updateTrip=useCallback((updated)=>{const trips=data.trips.map(t=>t.id===updated.id?updated:t);const newData={...data,trips};save(newData);setSelected(updated);},[data,save]);
  const deleteTrip=useCallback((id)=>{save({...data,trips:data.trips.filter(t=>t.id!==id)},false);deleteFromCloud(id);},[data,save,deleteFromCloud]);
  const importTrips=useCallback((imported)=>{const existing=new Map(data.trips.map(t=>[t.id,t]));imported.forEach(t=>existing.set(t.id,{...t,id:t.id||uid()}));save({...data,trips:Array.from(existing.values())});setShowSettings(false);},[data,save]);
  const handlePull=useCallback(async()=>{const cloudTrips=await pullFromCloud();if(cloudTrips){const merged=new Map(data.trips.map(t=>[t.id,t]));cloudTrips.forEach(t=>merged.set(t.id,t));const newData={...data,trips:Array.from(merged.values())};setData(newData);LS.set(newData);}},[data,pullFromCloud]);

  if(!hydrated)return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div style={{fontSize:44}}>🌍</div>
      <p style={{fontFamily:'Syne,sans-serif',fontSize:18,fontWeight:700}}>Palima Clone Plus</p>
      <p className="pulse" style={{fontSize:13,color:C.t3}}>Chargement & synchronisation...</p>
    </div>
  );

  const liveSelected=selected?data.trips.find(t=>t.id===selected.id)||selected:null;

  return(
    <>
      {liveSelected?(
        <TripDetail trip={liveSelected} onUpdate={updateTrip} onDelete={deleteTrip} onBack={()=>setSelected(null)} syncStatus={syncStatus}/>
      ):(
        <Dashboard trips={data.trips} onCreate={()=>setShowCreate(true)} onSelect={setSelected} syncStatus={syncStatus} onSettings={()=>setShowSettings(true)}/>
      )}
      {showCreate&&<CreateTripWizard onSave={createTrip} onClose={()=>setShowCreate(false)}/>}
      {showSettings&&<SettingsModal deviceId={deviceId} trips={data.trips} onImport={importTrips} onClose={()=>setShowSettings(false)} onPull={handlePull} syncStatus={syncStatus}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
